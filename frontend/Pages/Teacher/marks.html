<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/teacher/marks.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://tse2.mm.bing.net/th/id/OIP.3NutcxKMKBdxY9JVw5NeugHaHa?w=2000&h=2000&rs=1&pid=ImgDetMain&o=7&rm=3"
                    alt="SchoolMS Logo" class="sidebar-logo">
                <span class="sidebar-brand">SchoolMS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 3H10V10H3V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M14 3H21V10H14V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M14 14H21V21H14V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M3 14H10V21H3V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z"
                            stroke="currentColor" stroke-width="2" />
                        <path d="M12 7V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span>Attendance</span>
                </a>
                <a href="marks.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 4H4V21H20V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path
                            d="M18.5 2.5C19.3284 1.67157 20.6716 1.67157 21.5 2.5C22.3284 3.32843 22.3284 4.67157 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span>Marks Entry</span>
                </a>

            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">M</div>
                    <div class="user-info">
                        <p class="user-name">Ms. Sarah Johnson</p>
                        <p class="user-role">Teacher</p>
                    </div>
                </div>
                <a href="#" class="sign-out">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>Sign Out</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h2 class="page-title">Marks Entry</h2>
            </header>

            <section class="marks-section">
                <div class="marks-header" style="flex-direction: column; align-items: flex-start; gap: 15px;">
                    <div class="subject-info" style="width: 100%;">
                        <h1 class="dashboard-title">Enter Marks</h1>
                        <div class="filter-controls"
                            style="display: flex; gap: 15px; margin-top: 15px; align-items: center; flex-wrap: wrap;">
                            <div style="display: flex; flex-direction: column; gap: 5px;">
                                <label for="class-select"
                                    style="font-size: 14px; font-weight: 500; color: #64748b;">Select Class</label>
                                <select id="class-select"
                                    style="padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e8f0; font-family: inherit; background: white; min-width: 150px; color: #0f172a; font-size: 14px;">
                                    <option value="" disabled selected>Choose Class...</option>
                                    <option value="1">Class 1</option>
                                    <option value="2">Class 2</option>
                                    <option value="3">Class 3</option>
                                    <option value="4">Class 4</option>
                                    <option value="5">Class 5</option>
                                    <option value="6">Class 6</option>
                                    <option value="7">Class 7</option>
                                    <option value="8">Class 8</option>
                                    <option value="9">Class 9</option>
                                    <option value="10">Class 10</option>
                                </select>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 5px;">
                                <label for="subject-select"
                                    style="font-size: 14px; font-weight: 500; color: #64748b;">Select Subject</label>
                                <select id="subject-select"
                                    style="padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e8f0; font-family: inherit; background: white; min-width: 150px; color: #0f172a; font-size: 14px;">
                                    <option value="" disabled selected>Choose Subject...</option>
                                    <option value="Mathematics">Mathematics</option>
                                    <option value="Science">Science</option>
                                    <option value="English">English</option>
                                    <option value="History">History</option>
                                    <option value="Computer">Computer</option>
                                </select>
                            </div>
                             <div style="display: flex; flex-direction: column; gap: 5px;">
                                <label for="term-select"
                                    style="font-size: 14px; font-weight: 500; color: #64748b;">Select Term</label>
                                <select id="term-select"
                                    style="padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e8f0; font-family: inherit; background: white; min-width: 150px; color: #0f172a; font-size: 14px;">
                                    <option value="" disabled selected>Choose Term...</option>
                                    <option value="First">First Term</option>
                                    <option value="Mid">Mid Term</option>
                                    <option value="Final">Final Term</option>
                                </select>
                            </div>
                            
                        </div>
                    </div>
                </div>

                <div id="no-selection-message"
                    style="text-align: center; padding: 40px; color: #64748b; background: white; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; margin-bottom: 20px;">
                    Please select a class and a subject to enter marks.
                </div>

                <div class="marks-table-card" id="marks-table-container" style="display: none;">
                    <table class="marks-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th class="text-right" style="width: 150px;">Total Marks</th>
                                <th class="text-right" style="width: 150px;">Obtained Marks</th>
                            </tr>
                        </thead>
                        <tbody id="marks-tbody">
                            <!-- Students will be dynamically populated here -->
                        </tbody>
                    </table>
                </div>

                <div class="marks-footer" id="marks-footer" style="display: none;">
                    <button class="save-draft-btn">Save as Draft</button>
                    <button class="cancel-btn">Cancel</button>
                </div>
            </section>
        </main>
    </div>
    <script src="../../js/teacher/marks.js"></script>
</body>

</html>
