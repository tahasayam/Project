<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolMS - Teacher Dashboard</title>
    <link rel="stylesheet" href="../../css/teacher/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://tse2.mm.bing.net/th/id/OIP.3NutcxKMKBdxY9JVw5NeugHaHa?w=2000&h=2000&rs=1&pid=ImgDetMain&o=7&rm=" alt="SchoolMS Logo" class="sidebar-logo">
                <span class="sidebar-brand">SchoolMS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3H10V10H3V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 3H21V10H14V3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 14H21V21H14V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 14H10V21H3V14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="currentColor" stroke-width="2"/><path d="M12 7V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span>Attendance</span>
                </a>
                <a href="marks.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 4H4V21H20V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5C19.3284 1.67157 20.6716 1.67157 21.5 2.5C22.3284 3.32843 22.3284 4.67157 21.5 5.5L12 15L8 16L9 12L18.5 2.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>Marks Entry</span>
                </a>

            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">M</div>
                    <div class="user-info">
                        <p class="user-name" id="teacher-name">Loading...</p>
                        <p class="user-role" id="teacher-email">Teacher</p>
                        <div id="teacher-assignments-container" style="font-size: 11px; opacity: 0.8; margin-top: 5px;"></div>
                    </div>
                </div>
                <a href="#" class="sign-out">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span>Sign Out</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header" style="justify-content: space-between;">
                   <h1 class="dashboard-title" style="margin-bottom:0; flex:1;">Teacher Dashboard</h1>
                   <a href="../login.html" style="padding: 8px 16px; background-color: #1a1a2e; color: white; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 14px; display: inline-flex; align-items: center; transition: background 0.2s;">
                       ⬅ Back to login
                   </a>
            </header>

            <section class="dashboard-overview">
                <div class="welcome-banner" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 40px; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);">
                    <h1 style="font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 10px;">Welcome to Your Portal</h1>
                    <p style="opacity: 0.8; font-size: 16px;">Manage your attendance and marks entry from the sidebar menu.</p>
                    <div style="margin-top: 25px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 30px;">
                        <div>
                            <p style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px;">Select Class</p>
                            <select id="dashboard-class-select" style="padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-family: inherit; font-size: 14px; min-width: 180px; cursor: pointer; outline: none;">
                                <option value="all" style="color: #0f172a;">All Classes</option>
                            </select>
                        </div>
                        <div>
                            <p style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px;">Total Students</p>
                            <h3 id="teacher-student-count" style="font-size: 24px; font-weight: 700; font-family: 'Outfit', sans-serif;">0</h3>
                        </div>
                    </div>
                </div>

                <!-- Student List Section -->
                <div id="student-list-container" style="display: none; animation: fadeIn 0.4s ease-out;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="font-family: 'Outfit', sans-serif; font-size: 20px; color: #0f172a;">Class Students</h2>
                        <span id="selected-class-name" style="padding: 4px 12px; background: #e2e8f0; border-radius: 20px; font-size: 12px; font-weight: 600; color: #475569;"></span>
                    </div>
                    <div style="background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                                    <th style="padding: 16px 24px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Roll No</th>
                                    <th style="padding: 16px 24px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;">Student Name</th>
                                </tr>
                            </thead>
                            <tbody id="dashboard-student-list">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            </section>
        </main>
    </div>
    <script src="../../js/teacher/teacher.js"></script>
</body>
</html>
